<!DOCTYPE html>
<html><head><meta charset="UTF-8"></head><body>
<div id="app"><h1>{{ msg }}</h1></div>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<script>
window.onerror = function(m,s,l) { document.body.innerHTML += '<p style=color:red>ERROR: '+m+' at '+s+':'+l+'</p>'; };
const { createApp } = Vue;
createApp({ data() { return { msg: 'Hello Vue!' }; } }).mount('#app');
</script>
</body></html>
