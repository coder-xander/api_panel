<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>Test 2</title>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<link rel="stylesheet" href="../static/style.css">
</head>
<body>
<div id="app">
  <header class="app-header">
    <div class="titlebar-drag"><span class="titlebar-logo">⚡ API 聚合面板</span></div>
    <div class="titlebar-actions">
      <button class="titlebar-refresh" :class="{ spinning: refreshingAll }" @click="refreshAll">⟳ TEST</button>
      <div class="window-controls">
        <button class="win-btn win-btn-min" @click="minimizeWindow">_</button>
        <button class="win-btn win-btn-max" @click="toggleMaximize">□</button>
        <button class="win-btn win-btn-close" @click="closeWindow">✕</button>
      </div>
    </div>
  </header>
  <main class="main"><div class="cards-grid">
    <div v-for="p in platforms" :key="p.id" class="card">
      <div class="card-header"><div class="card-title">{{ p.name }}</div></div>
      <div class="card-status" v-if="!p.has_key">未配置</div>
      <div class="card-status" v-else>已配置: {{ p.masked_key }}</div>
      <div class="balance-value">{{ formatBalance(p.id) }}</div>
      <div class="card-actions">
        <button @click="refreshOne(p.id)">刷新</button>
        <button @click="openSettings(p)">设置</button>
      </div>
    </div>
  </div></main>
</div>
<script src="../static/app.js"></script>
</body>
</html>
