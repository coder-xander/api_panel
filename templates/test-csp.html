<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>Test CSP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self'">
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<link rel="stylesheet" href="../static/style.css">
</head>
<body>
<div id="app">
  <header class="app-header">
    <div class="titlebar-drag"><span class="titlebar-logo">⚡ API 聚合面板</span></div>
    <div class="titlebar-actions">
      <button class="titlebar-refresh" :class="{ spinning: refreshingAll }" @click="refreshAll">⟳ 全部刷新</button>
      <div class="window-controls">
        <button class="win-btn win-btn-min" @click="minimizeWindow"><svg width="12" height="12" viewBox="0 0 12 12"><rect x="1.5" y="5.5" width="9" height="1.5" rx="0.75" fill="currentColor"/></svg></button>
        <button class="win-btn win-btn-max" @click="toggleMaximize"><svg width="12" height="12" viewBox="0 0 12 12"><rect x="1.5" y="1.5" width="9" height="9" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.5"/></svg></button>
        <button class="win-btn win-btn-close" @click="closeWindow"><svg width="12" height="12" viewBox="0 0 12 12"><line x1="1.5" y1="1.5" x2="10.5" y2="10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="10.5" y1="1.5" x2="1.5" y2="10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
      </div>
    </div>
  </header>
  <main class="main"><div class="cards-grid">
    <div v-for="p in platforms" :key="p.id" class="card">
      <div class="card-header">
        <div><div class="card-title">{{ p.name }}</div><div class="card-alias">{{ p.alias }}</div></div>
        <span class="card-badge" :class="p.has_key ? 'active' : 'inactive'">{{ p.has_key ? '● 已配置' : '○ 未配置' }}</span>
      </div>
      <template v-if="!p.has_key"><div class="card-status no-api">未配置</div></template>
      <template v-else-if="!p.has_balance_api"><div class="card-status no-api">无API</div></template>
      <template v-else>
        <div class="balance-value">{{ formatBalance(p.id) }}</div>
        <div class="card-actions">
          <button @click="refreshOne(p.id)">刷新</button>
          <button @click="openSettings(p)">设置</button>
        </div>
      </template>
    </div>
  </div></main>
</div>
<script src="../static/app.js"></script>
</body>
</html>
