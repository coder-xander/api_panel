<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>Debug Index</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<link rel="stylesheet" href="../static/style.css">
</head>
<body>
<div id="app">
  <header class="app-header">
    <div class="titlebar-drag"><span class="titlebar-logo">⚡ API 聚合面板</span></div>
    <div class="titlebar-actions">
      <button class="titlebar-refresh">⟳ DEBUG</button>
      <div class="window-controls">
        <button class="win-btn win-btn-min">_</button>
        <button class="win-btn win-btn-max">□</button>
        <button class="win-btn win-btn-close">✕</button>
      </div>
    </div>
  </header>
  <main class="main">
    <div class="cards-grid">
      <div v-for="p in platforms" :key="p.id" class="card">
        <div class="card-header">
          <div class="card-title">{{ p.name }}</div>
        </div>
        <div class="card-status">DEBUG: {{ p.name }}</div>
      </div>
    </div>
  </main>
</div>
<script src="../static/app-debug.js"></script>
</body>
</html>
