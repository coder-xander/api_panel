<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API 聚合面板 — 余额 &amp; 用量</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a0f0a'/%3E%3Ctext x='16' y='24' font-size='22' text-anchor='middle' fill='%23a3ff47' font-family='sans-serif' font-weight='bold'%3E⚡%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- CSP omitted: Electron contextIsolation + nodeIntegration:false provides sufficient security --><script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<link rel="stylesheet" href="../static/style.css">
</head>
<body>

<div id="app">
  <!-- ══════ 自定义标题栏（无边框窗口） ══════ -->
  <header class="app-header">
    <!-- 拖拽区域：Logo + 标题 -->
    <div class="titlebar-drag">
      <span class="titlebar-logo">⚡ API 聚合面板</span>
    </div>

    <!-- 非拖拽区域：操作 + 窗口控制 -->
    <div class="titlebar-actions">
      <button class="titlebar-refresh" :class="{ spinning: refreshingAll }" @click="refreshAll" :disabled="refreshingAll">
        <span class="icon">⟳</span> 全部刷新
      </button>

      <!-- 窗口控制按钮 -->
      <div class="window-controls">
        <button class="win-btn win-btn-min" title="最小化" @click="minimizeWindow">
          <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1.5" y="5.5" width="9" height="1.5" rx="0.75" fill="currentColor"/></svg>
        </button>
        <button class="win-btn win-btn-max" title="最大化" @click="toggleMaximize">
          <svg v-if="windowMaximized" width="12" height="12" viewBox="0 0 12 12"><rect x="2" y="0" width="8" height="8" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.5"/><rect x="4" y="2" width="8" height="8" rx="1.5" fill="var(--bg-card)" stroke="currentColor" stroke-width="1.5"/></svg>
          <svg v-else width="12" height="12" viewBox="0 0 12 12"><rect x="1.5" y="1.5" width="9" height="9" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
        <button class="win-btn win-btn-close" title="关闭" @click="closeWindow">
          <svg width="12" height="12" viewBox="0 0 12 12"><line x1="1.5" y1="1.5" x2="10.5" y2="10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="10.5" y1="1.5" x2="1.5" y2="10.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="cards-grid">
      <div v-for="p in platforms" :key="p.id" class="card">
        <!-- 头部 -->
        <div class="card-header">
          <div>
            <div class="card-title">{{ p.name }}</div>
            <div class="card-alias">{{ p.alias }}</div>
          </div>
          <span class="card-badge" :class="p.has_key ? 'active' : 'inactive'">
            {{ p.has_key ? '● 已配置' : '○ 未配置' }}
          </span>
        </div>

        <!-- 未配置 -->
        <template v-if="!p.has_key">
          <div class="card-status no-api">尚未配置 API Key，点击下方按钮设置</div>
        </template>
        <!-- 无 API -->
        <template v-else-if="!p.has_balance_api">
          <div class="card-status no-api">
            此平台不支持 API 查询余额
            <br v-if="p.console_url">
            <a v-if="p.console_url" :href="p.console_url" target="_blank">→ 前往网页控制台查看</a>
          </div>
        </template>
        <!-- 有余额 -->
        <template v-else>
          <div class="balance-value">{{ formatBalance(p.id) }}</div>
          <div class="balance-label">{{ balanceLabel(p.id) }}</div>
          <div class="balance-details">
            <div v-for="d in balanceDetails(p.id)" :key="d.label" class="balance-detail-item">
              <span class="label">{{ d.label }}</span><br>
              <span class="value">{{ d.value }}</span>
            </div>
          </div>
          <!-- 今日用量（仅 Lumai） -->
          <div v-if="todayUsage(p.id)" class="today-usage">
            <div class="today-label">{{ todayUsage(p.id).is_today ? '📊 今日用量' : '📊 最近用量 (' + todayUsage(p.id).date + ')' }}</div>
            <div class="today-grid">
              <div><span class="label">请求数</span><br><span class="value">{{ todayUsage(p.id).requests }}</span></div>
              <div><span class="label">消耗</span><br><span class="value">${{ todayUsage(p.id).cost.toFixed(4) }}</span></div>
              <div><span class="label">实际扣费</span><br><span class="value">${{ todayUsage(p.id).actual_cost.toFixed(4) }}</span></div>
            </div>
          </div>
        </template>

        <!-- 状态 -->
        <div v-if="statusMsg(p.id)" class="card-status" :class="statusClass(p.id)" v-html="statusMsg(p.id)"></div>

        <!-- 按钮 -->
        <div class="card-actions">
          <button v-if="p.has_balance_api && p.has_key" @click="refreshOne(p.id)" :disabled="p.loading">
            ⟳ 刷新余额
          </button>
          <button @click="openSettings(p)">⚙ 设置</button>
          <a v-if="p.console_url" :href="p.console_url" target="_blank" class="btn-console">🔗 控制台</a>
        </div>
      </div>
    </div>
  </main>

  <!-- 设置弹窗 -->
  <div class="modal-overlay" v-if="showModal" @click.self="closeModal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">设置 — {{ editingPlatform?.name }}</h2>
        <button class="modal-close" @click="closeModal">&times;</button>
      </div>
      <div class="modal-body">
        <form @submit.prevent="saveSettings">
          <label class="field">
            <span class="field-label">别名</span>
            <input type="text" v-model="formAlias" placeholder="给这个平台起个名字">
          </label>
          <label class="field">
            <span class="field-label">API Key</span>
            <div class="key-input-wrap">
              <input :type="showKey ? 'text' : 'password'" v-model="formKey" placeholder="输入 API Key" autocomplete="off">
              <button type="button" class="toggle-key" @click="showKey = !showKey">{{ showKey ? '🙈' : '👁' }}</button>
            </div>
          </label>
          <div class="form-actions">
            <button type="submit" class="btn-primary">💾 保存</button>
            <button type="button" class="btn-secondary" @click="closeModal">取消</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <footer class="footer">
    <span>数据存储于本地 <code>config/keys.json</code></span>
    <span class="footer-dot">·</span>
    <span>每 30 分钟自动刷新</span>
    <span class="footer-dot">·</span>
    <span>Electron 1.0.0</span>
  </footer>
</div>

<script src="../static/app.js"></script>
</body>
</html>
